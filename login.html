<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login | Kazu Yakitori & Sake Bar</title>
  <link rel="stylesheet" href="index.css">
  <style>
    body {
      background-color: var(--bg-obsidian);
      background-image: radial-gradient(circle at center, rgba(193, 18, 31, 0.05) 0%, transparent 70%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--color-text-light);
      overflow: hidden;
    }
    
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 1.5rem;
    }
    
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-glass);
      box-shadow: var(--shadow-card);
      border-radius: 12px;
      padding: 2.2rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-align: center;
      position: relative;
    }
    
    .login-card::before {
      content: "";
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(135deg, var(--color-primary), transparent, var(--color-accent));
      border-radius: 14px;
      z-index: -1;
      opacity: 0.15;
    }
    
    .logo-container {
      margin-bottom: 2rem;
    }
    
    .logo-badge {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(193, 18, 31, 0.15);
      border: 2px solid var(--color-primary);
      box-shadow: var(--shadow-neon);
      color: var(--color-primary);
      font-size: 2rem;
      margin-bottom: 1rem;
      animation: glowPulse 3s infinite ease-in-out;
    }
    
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 15px rgba(193, 18, 31, 0.35); border-color: var(--color-primary); }
      50% { box-shadow: 0 0 25px rgba(193, 18, 31, 0.6); border-color: #ff3344; }
    }
    
    .login-title {
      font-family: var(--font-serif);
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 0.4rem;
      color: var(--color-text-light);
    }
    
    .login-subtitle {
      font-size: 0.85rem;
      color: var(--color-text-muted);
      margin-bottom: 2rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }
    
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-text-light);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .input-wrapper {
      position: relative;
    }
    
    .passcode-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid var(--border-glass);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      padding-right: 2.8rem;
      color: var(--color-text-light);
      font-size: 1.1rem;
      letter-spacing: 4px;
      text-align: center;
      transition: var(--transition-smooth);
    }
    
    .passcode-input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: var(--shadow-neon);
      background: rgba(0, 0, 0, 0.6);
    }
    
    .toggle-visibility {
      position: absolute;
      right: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--color-text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.2rem;
      transition: var(--transition-smooth);
    }
    
    .toggle-visibility:hover {
      color: var(--color-text-light);
    }
    
    .error-msg {
      background: rgba(231, 76, 60, 0.12);
      border: 1px solid rgba(231, 76, 60, 0.3);
      color: #e74c3c;
      font-size: 0.8rem;
      padding: 0.6rem;
      border-radius: 6px;
      margin-bottom: 1.5rem;
      display: none;
      animation: shake 0.3s ease;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }
    
    .btn-login {
      width: 100%;
      background: var(--color-primary);
      color: var(--color-text-light);
      border: none;
      border-radius: 6px;
      padding: 0.8rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition-smooth);
      box-shadow: var(--shadow-neon);
      letter-spacing: 0.5px;
    }
    
    .btn-login:hover {
      background: #d90429;
      transform: translateY(-1px);
      box-shadow: 0 0 25px rgba(193, 18, 31, 0.5);
    }
    
    .btn-login:active {
      transform: translateY(1px);
    }
    
    .footer-note {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <div class="logo-container">
        <div class="logo-badge">🍶</div>
        <h1 class="login-title">Kazu Staff Portal</h1>
        <p class="login-subtitle">Level 1, 43 Courtenay Place, Wellington</p>
      </div>
      
      <div class="error-msg" id="login-error">
        ⚠️ Incorrect passcode. Please try again.
      </div>
      
      <form id="login-form">
        <div class="form-group">
          <label for="passcode">Enter Staff Passcode</label>
          <div class="input-wrapper">
            <input type="password" id="passcode" class="passcode-input" placeholder="••••" required autofocus autocomplete="current-password">
            <button type="button" class="toggle-visibility" id="btn-toggle-visibility" title="Show/Hide Passcode">👁️</button>
          </div>
        </div>
        
        <button type="submit" class="btn-login">
          🔑 Access Console
        </button>
      </form>
      
      <div class="footer-note">
        Authorized staff only. Session ends on tab close.
      </div>
    </div>
  </div>

  <script>
    // Simple inline router gate check
    if (sessionStorage.getItem("kazu_logged_in") === "true") {
      window.location.replace("index.html");
    }
    
    const loginForm = document.getElementById("login-form");
    const passcodeField = document.getElementById("passcode");
    const toggleBtn = document.getElementById("btn-toggle-visibility");
    const errorAlert = document.getElementById("login-error");
    
    // Default staff passcode
    const STAFF_PASSCODE = "kazu2026";
    
    // Toggle passcode visibility
    toggleBtn.addEventListener("click", () => {
      if (passcodeField.type === "password") {
        passcodeField.type = "text";
        passcodeField.style.letterSpacing = "normal";
        toggleBtn.textContent = "🙈";
      } else {
        passcodeField.type = "password";
        passcodeField.style.letterSpacing = "4px";
        toggleBtn.textContent = "👁️";
      }
      passcodeField.focus();
    });
    
    // Handle form submit
    loginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const enteredCode = passcodeField.value.trim();
      
      if (enteredCode === STAFF_PASSCODE) {
        sessionStorage.setItem("kazu_logged_in", "true");
        window.location.replace("index.html");
      } else {
        errorAlert.style.display = "block";
        // Trigger shake animation
        errorAlert.style.animation = "none";
        errorAlert.offsetHeight; // trigger reflow
        errorAlert.style.animation = "shake 0.3s ease";
        
        passcodeField.value = "";
        passcodeField.focus();
      }
    });
  </script>
</body>
</html>
